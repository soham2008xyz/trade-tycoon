name: Build Android

on:
  push:
    branches:
      - master
    paths:
      - apps/client/**
  workflow_dispatch:
    inputs:
      profile:
        type: string
        description: Build profile (development | preview | production)
        default: production

jobs:
  build_android:
    name: Build Android app
    type: build
    params:
      platform: android
      profile: ${{ inputs.profile || 'production' }}

  submit_android:
    name: Submit to Play Store
    type: submit
    needs:
      - build_android
    if: ${{ github.ref == 'refs/heads/master' && (inputs.profile == 'production' || inputs.profile == '') }}
    params:
      profile: production
      build_id: ${{ needs.build_android.outputs.build_id }}
