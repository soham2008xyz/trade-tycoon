name: Bug Report
description: Report a bug or unexpected behavior in the game
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please be as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your environment
      placeholder: |
        - Workspace: [e.g., game-logic, server, client]
        - OS: [e.g., macOS 14.0]
        - Browser/Device: [e.g., Chrome 120, iPhone 15]
        - Version/Commit: [e.g., v1.2.3 or commit SHA]

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots, error logs, or console output to help explain the problem
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information (e.g., related issues, workarounds)
